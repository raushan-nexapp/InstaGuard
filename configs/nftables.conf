flush ruleset

table inet firewall {
    chain input {
        type filter hook input priority 0;
        policy drop;

        # Allow established/related connections
        ct state established,related accept

        # Allow loopback
        iif "lo" accept

        # SSH access from anywhere (tighten later)
        tcp dport 22 accept

        # DNS from LAN clients only
        udp dport 53 iifname "enp2s0" accept
        tcp dport 53 iifname "enp2s0" accept

        # DHCP from LAN clients only
        udp dport 67 iifname "enp2s0" accept

        # ICMP ping
        ip protocol icmp accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;

        # Allow return traffic
        ct state established,related accept

        # LAN → WAN allow
        iif "enp2s0" oif "enp1s0" accept
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100;

        # NAT for internet access
        oif "enp1s0" masquerade
    }
}
