# NexappOS — network forwarding and router tunables
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding=1

# Reverse path filtering (loose mode — needed for asymmetric routing)
net.ipv4.conf.all.rp_filter=2
net.ipv4.conf.default.rp_filter=2

# Conntrack hash size tuning for higher session counts
net.netfilter.nf_conntrack_max=131072
